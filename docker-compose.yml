services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-bbs}
      POSTGRES_USER:     ${POSTGRES_USER:-bbs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bbs_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bbs_user} -d ${POSTGRES_DB:-bbs}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
